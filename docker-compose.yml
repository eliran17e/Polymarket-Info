services:
  db:
    image: postgres:16
    container_name: polymarket_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: polymarket
      POSTGRES_PASSWORD: polymarket
      POSTGRES_DB: polymarket
    ports:
      # host:container — host 5434 (5432/5433 are used by other projects on this machine),
      # container still listens on 5432 internally.
      - "5434:5432"
    volumes:
      - polymarket_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymarket -d polymarket"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  polymarket_pgdata:
